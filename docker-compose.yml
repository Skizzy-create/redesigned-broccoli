services:
  db:
    image: postgres:16
    container_name: smartdoc-db
    environment:
      POSTGRES_USER: smartdoc
      POSTGRES_PASSWORD: smartdoc
      POSTGRES_DB: smartdocqa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdoc -d smartdocqa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartdoc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdoc-app
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://smartdoc:smartdoc@db:5432/smartdocqa
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdoc-worker
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://smartdoc:smartdoc@db:5432/smartdocqa
    command: ["celery", "-A", "app.queue.celery_app:celery_app", "worker", "--loglevel=INFO", "--pool=solo"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
